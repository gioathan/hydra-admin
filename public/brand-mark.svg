<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="body">
      <ellipse cx="286" cy="288" rx="70" ry="104"/>
    </clipPath>
  </defs>

  <!-- flight path loop -->
  <path d="M120 400
           C 70 340, 120 250, 190 270
           C 240 284, 236 348, 196 344
           C 168 341, 172 306, 200 306"
        fill="none" stroke="#0C5F7D" stroke-width="14" stroke-linecap="round"/>

  <!-- wings -->
  <ellipse cx="250" cy="196" rx="42" ry="70" fill="#FBEAC6" stroke="#E8A83C" stroke-width="8"
           transform="rotate(-32 250 196)"/>
  <ellipse cx="330" cy="200" rx="38" ry="62" fill="#FBEAC6" stroke="#E8A83C" stroke-width="8"
           transform="rotate(30 330 200)"/>

  <!-- body -->
  <ellipse cx="286" cy="288" rx="70" ry="104" fill="#E8A83C"/>

  <!-- stripes -->
  <g clip-path="url(#body)" fill="#0C5F7D">
    <rect x="200" y="250" width="180" height="26"/>
    <rect x="200" y="300" width="180" height="26"/>
    <rect x="200" y="350" width="180" height="26"/>
  </g>

  <!-- head -->
  <circle cx="286" cy="176" r="34" fill="#0C5F7D"/>

  <!-- antennae -->
  <path d="M274 150 C 262 118, 246 112, 232 120" fill="none" stroke="#0C5F7D" stroke-width="8" stroke-linecap="round"/>
  <path d="M298 150 C 310 118, 326 112, 340 120" fill="none" stroke="#0C5F7D" stroke-width="8" stroke-linecap="round"/>
  <circle cx="230" cy="120" r="9" fill="#E8A83C"/>
  <circle cx="342" cy="120" r="9" fill="#E8A83C"/>
</svg>
